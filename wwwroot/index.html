<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Campus VR - C.NET</title>

  <!-- A-Frame para realidad virtual WebXR -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
    }

    .panel-info {
      position: fixed;
      top: 15px;
      left: 15px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.72);
      color: white;
      padding: 14px 18px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.4;
      max-width: 340px;
    }

    .panel-info strong {
      color: #8fd3ff;
    }

    .estado {
      margin-top: 6px;
      font-size: 13px;
      color: #d5f5d5;
    }
  </style>
</head>

<body>

  <div class="panel-info">
    <strong>Campus VR - C.NET</strong><br>
    Modelo: campusv2.glb<br>
    Entorno: Realidad Virtual WebXR<br>
    <div id="estadoModelo" class="estado">Cargando modelo 3D...</div>
  </div>

  <a-scene
    vr-mode-ui="enabled: true"
    renderer="antialias: true; colorManagement: true"
    background="color: #87CEEB"
  >

    <!-- Recursos -->
    <a-assets timeout="60000">
      <a-asset-item id="campus" src="/campusv2.glb"></a-asset-item>
    </a-assets>

    <!-- Luces -->
    <a-entity light="type: ambient; intensity: 0.9"></a-entity>

    <a-entity
      light="type: directional; intensity: 1.3"
      position="8 12 8"
    ></a-entity>

    <!-- Cielo -->
    <a-sky color="#87CEEB"></a-sky>

    <!-- Suelo base -->
    <a-plane
      position="0 -0.02 0"
      rotation="-90 0 0"
      width="300"
      height="300"
      color="#6BAA75"
      shadow="receive: true"
    ></a-plane>

    <!-- Modelo 3D del campus -->
    <a-entity
      id="modeloCampus"
      gltf-model="#campus"
      position="0 0 -6"
      rotation="0 0 0"
      scale="1 1 1"
      shadow="cast: true; receive: true"
    ></a-entity>

    <!-- Título dentro del entorno -->
    <a-text
      value="Campus VR - Modelo 3D"
      position="-3 3 -5"
      color="#ffffff"
      width="7"
      align="center"
    ></a-text>

    <!-- Punto de referencia -->
    <a-box
      position="0 0.5 -3"
      width="0.3"
      height="1"
      depth="0.3"
      color="#ffcc00"
    ></a-box>

    <!-- Cámara y movimiento -->
    <a-entity id="rig" position="0 1.6 5">
      <a-camera
        wasd-controls="enabled: true; acceleration: 25"
        look-controls="enabled: true"
        cursor="rayOrigin: mouse"
      >
        <a-cursor
          color="#ffffff"
          fuse="false"
        ></a-cursor>
      </a-camera>
    </a-entity>

  </a-scene>

  <script>
    const estado = document.getElementById("estadoModelo");
    const modelo = document.querySelector("#modeloCampus");

    modelo.addEventListener("model-loaded", () => {
      console.log("Modelo campusv2.glb cargado correctamente");
      estado.textContent = "Modelo cargado correctamente.";
      estado.style.color = "#d5f5d5";
    });

    modelo.addEventListener("model-error", (error) => {
      console.error("Error cargando campusv2.glb:", error);
      estado.textContent = "Error: no cargó campusv2.glb. Revisar /api/verificar-modelo";
      estado.style.color = "#ffb3b3";
      alert("No cargó campusv2.glb. Abre /api/verificar-modelo en Render para revisar si el archivo está completo.");
    });

    fetch("/api/verificar-modelo")
      .then(response => response.json())
      .then(data => {
        console.log("Verificación del modelo:", data);

        if (!data.existe) {
          estado.textContent = "El archivo campusv2.glb no existe en Render.";
          estado.style.color = "#ffb3b3";
          return;
        }

        if (data.esPunteroGitLfs) {
          estado.textContent = "Render tiene solo el puntero Git LFS, no el GLB real.";
          estado.style.color = "#ffb3b3";
          return;
        }

        estado.textContent = "Modelo encontrado en servidor: " + data.pesoMB + " MB";
        estado.style.color = "#d5f5d5";
      })
      .catch(error => {
        console.warn("No se pudo consultar /api/verificar-modelo:", error);
        estado.textContent = "No se pudo verificar el modelo, pero se intentará cargar.";
        estado.style.color = "#fff3b0";
      });
  </script>

</body>
</html>
